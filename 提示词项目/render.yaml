services:
  - type: web
    name: prompt-hub
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: SECRET_TOKEN
        sync: false
      - key: PORT
        value: "8000"
