{% extends "base.html" %}
{% block title %}管理分类{% endblock %}

{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin:24px 0 16px;">
    <h1>📂 分类管理</h1>
</div>

<div style="display:grid; grid-template-columns: 1fr 1fr; gap: 24px;">
    <div class="card">
        <h3>添加分类</h3>
        <form action="/admin/categories/save" method="post">
            <div class="form-group">
                <label>名称 *</label>
                <input type="text" name="name" required>
            </div>
            <div class="form-group">
                <label>Slug</label>
                <input type="text" name="slug" placeholder="留空自动生成">
            </div>
            <div class="form-group">
                <label>图标</label>
                <input type="text" name="icon" value="📁">
            </div>
            <div class="form-group">
                <label>描述</label>
                <input type="text" name="description">
            </div>
            <button type="submit" class="btn btn-primary">+ 添加</button>
        </form>
    </div>
    <div>
        <table>
            <thead><tr><th>图标</th><th>名称</th><th>Slug</th><th>操作</th></tr></thead>
            <tbody>
                {% for c in categories %}
                <tr>
                    <td>{{ c.icon }}</td>
                    <td>{{ c.name }}</td>
                    <td style="font-size:0.85rem; color:var(--text-dim);">{{ c.slug }}</td>
                    <td>
                        <form action="/admin/categories/{{ c.id }}/delete" method="post" onsubmit="return confirm('确认删除？')">
                            <button type="submit" class="btn btn-sm btn-danger">删除</button>
                        </form>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" style="text-align:center; color:var(--text-dim);">暂无分类</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
